# ============================================================
# YCL启动器 — GitHub Actions 云端自动打包工作流
# 功能：Push/PR 触发 → 编译 → 归档 Release APK
# ============================================================

name: YCL-Launcher CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 强制使用 Node.js 24（解决 Node 20 弃用警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 编译 Release APK (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      # ==========================================================
      # Step 1：检出代码
      # ==========================================================
      - name: 检出代码
        uses: actions/checkout@v4

      # ==========================================================
      # Step 2：配置 JDK 17
      # ==========================================================
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ==========================================================
      # Step 3：安装 Android SDK 组件
      #   直接使用 sdkmanager 命令行，逐个安装包
      #   避免 setup-android action 的 packages 参数格式化 Bug
      # ==========================================================
      - name: 安装 Android SDK 组件
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          # 使用预装的 cmdline-tools（latest 符号链接指向最新版本）
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            # 回退：查找其他 cmdline-tools 版本
            SDKMANAGER=$(find "${ANDROID_SDK_ROOT}/cmdline-tools" -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          echo "SDK Manager: ${SDKMANAGER}"

          # 接受所有 SDK 许可证
          yes | ${SDKMANAGER} --licenses > /dev/null 2>&1 || true

          # 逐个安装 SDK 包
          echo ">>> 安装 platforms;android-36"
          ${SDKMANAGER} "platforms;android-36" || echo "⚠️ 跳过（可能已安装或不存在）"

          echo ">>> 安装 build-tools;36.0.0"
          ${SDKMANAGER} "build-tools;36.0.0" || {
            echo "⚠️ build-tools;36.0.0 不可用，查找最新 build-tools..."
            LATEST_BT=$(${SDKMANAGER} --list 2>/dev/null | grep "build-tools;" | grep -v "rc" | tail -1 | awk '{print $1}')
            if [ -n "$LATEST_BT" ]; then
              echo ">>> 安装 ${LATEST_BT}"
              ${SDKMANAGER} "${LATEST_BT}" || echo "⚠️ 安装失败"
            fi
          }

          echo ">>> 安装 ndk;27.0.12077973"
          ${SDKMANAGER} "ndk;27.0.12077973" || echo "⚠️ NDK 跳过（纯 Kotlin 项目非必需）"

          echo "=== 环境就绪 ==="

      # ==========================================================
      # Step 4：设置 ANDROID_HOME 环境变量
      # ==========================================================
      - name: 设置 Android 环境变量
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      # ==========================================================
      # Step 5：缓存 Gradle 依赖
      # ==========================================================
      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ==========================================================
      # Step 6：赋予 Gradle Wrapper 执行权限
      # ==========================================================
      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      # ==========================================================
      # Step 7：编译 Release APK（使用 debug 签名）
      # ==========================================================
      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      # ==========================================================
      # Step 8：归档 APK 产物
      # ==========================================================
      - name: 上传 Release APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: YCL-Launcher-Release-APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.json
          retention-days: 30
          compression-level: 6

      # ==========================================================
      # Step 9：构建摘要
      # ==========================================================
      - name: 构建摘要
        run: |
          echo "### ✅ YCL启动器 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "**构建时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**架构**: arm64-v8a" >> $GITHUB_STEP_SUMMARY
          echo "**目标 API**: 36 (Android 16)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 APK 产物可在本页底部 **Artifacts** 区域下载" >> $GITHUB_STEP_SUMMARY