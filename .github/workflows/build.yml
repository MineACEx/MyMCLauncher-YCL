# ============================================================
# YCL启动器 — GitHub Actions 云端自动打包工作流
# ubuntu-24.04 镜像已预装 Gradle 9.5.1 + Android SDK 36
# ============================================================

name: YCL-Launcher CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 指定 Node.js 24（消除 Node 20 弃用警告）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 编译 Release APK (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      # ==========================================================
      # Step 1：检出代码
      # ==========================================================
      - name: 检出代码
        uses: actions/checkout@v4

      # ==========================================================
      # Step 2：配置 JDK 17
      # ==========================================================
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ==========================================================
      # Step 3：创建 local.properties（告知 AGP SDK 路径）
      # ==========================================================
      - name: 配置 Android SDK 路径
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      # ==========================================================
      # Step 4：生成 Gradle Wrapper
      #   ubuntu-24.04 镜像已预装 Gradle 9.5.1，用它生成 wrapper
      #   指定 8.11.1 版本以匹配项目 gradle-wrapper.properties
      # ==========================================================
      - name: 生成 Gradle Wrapper
        run: |
          echo "系统 Gradle 版本: $(gradle --version | grep 'Gradle ' | head -1)"
          gradle wrapper --gradle-version 8.11.1
          chmod +x ./gradlew
          echo "Wrapper 生成完成"

      # ==========================================================
      # Step 5：缓存 Gradle 依赖
      # ==========================================================
      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ==========================================================
      # Step 6：编译 Release APK
      #   Android SDK 已预装：platforms;android-36 + build-tools;36.0.0
      # ==========================================================
      - name: 编译 Release APK
        run: ./gradlew assembleRelease

      # ==========================================================
      # Step 7：归档 APK 产物
      # ==========================================================
      - name: 上传 Release APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: YCL-Launcher-Release-APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.json
          retention-days: 30
          compression-level: 6

      # ==========================================================
      # Step 8：构建摘要
      # ==========================================================
      - name: 构建摘要
        run: |
          echo "### ✅ YCL启动器 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "**构建时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**架构**: arm64-v8a" >> $GITHUB_STEP_SUMMARY
          echo "**目标 API**: 36 (Android 16)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 APK 产物可在本页底部 **Artifacts** 区域下载" >> $GITHUB_STEP_SUMMARY