# ============================================================
# YCL启动器 — GitHub Actions 云端自动打包
# ubuntu-24.04 预装 Gradle 9.5.1 + Android SDK 36
# ============================================================

name: YCL-Launcher CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 编译 Release APK
    runs-on: ubuntu-latest

    steps:
      # ──────────── 1. 检出代码 ────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ──────────── 2. 配置 JDK 17 ────────────
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ──────────── 3. 配置 Android SDK ────────────
      - name: 配置 Android SDK
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      # ──────────── 4. 生成 Gradle Wrapper ────────────
      #   用 curl 直接下载 wrapper jar（避免 gradle wrapper 命令
      #   触发项目配置阶段因潜在错误而失败）
      - name: 生成 Gradle Wrapper
        run: |
          WRAPPER_DIR="gradle/wrapper"
          mkdir -p "$WRAPPER_DIR"

          # 下载 Gradle 8.14.4 的 wrapper jar
          curl -sSL "https://services.gradle.org/distributions/gradle-8.14.4-bin.zip" -o /tmp/gradle-bin.zip
          unzip -qo /tmp/gradle-bin.zip -d /tmp/

          # 用该版本 Gradle 生成 wrapper（项目配置报错不影响 wrapper 生成）
          # 关键：先配一个空 settings 避免误解析，生成后再恢复
          cp settings.gradle.kts settings.gradle.kts.bak
          echo 'rootProject.name = "YCL-Launcher"' > settings.gradle.kts
          echo '' > build.gradle.kts
          mkdir -p app
          echo '' > app/build.gradle.kts

          /tmp/gradle-8.14.4/bin/gradle wrapper --gradle-version 8.14.4

          # 恢复真实项目文件
          mv settings.gradle.kts.bak settings.gradle.kts
          git checkout -- build.gradle.kts app/build.gradle.kts 2>/dev/null || true

          chmod +x gradlew
          echo "Gradle Wrapper 生成完成：$(./gradlew --version 2>/dev/null | head -1 || echo 'ok')"

      # ──────────── 5. 缓存 Gradle 依赖 ────────────
      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ──────────── 6. 编译 Release APK ────────────
      - name: 编译 Release APK
        run: ./gradlew assembleRelease --warning-mode=summary

      # ──────────── 7. 归档产物 ────────────
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: YCL-Launcher-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ──────────── 8. 构建摘要 ────────────
      - name: 构建摘要
        if: always()
        run: |
          echo "**构建时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**架构**: arm64-v8a | **API**: 36 (Android 16)" >> $GITHUB_STEP_SUMMARY
          echo "📦 APK 在 Artifacts 区域下载" >> $GITHUB_STEP_SUMMARY